workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagicFlutter

    environment:
      groups:
        - Ios_signing
      node: latest
      xcode: 16.3
      cocoapods: default
      vars:
        IOS_BUNDLE_IDENTIFIER: com.tenantpassport.app

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo prebuild iOS
        script: |
          export RCT_NEW_ARCH_ENABLED=0
          export EXPO_NEW_ARCH_ENABLED=0
          npx expo prebuild --platform ios --clean

      - name: Validate App Store Connect secrets
        script: |
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"
          REQUIRED_VARS=(
            APP_STORE_CONNECT_KEY_IDENTIFIER
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_PRIVATE_KEY
            IOS_BUNDLE_IDENTIFIER
          )
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME:-}" ]]; then
              echo "Missing required Codemagic secret: $VAR_NAME"
              exit 1
            fi
          done
          echo "App Store Connect secrets detected."

      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"
          keychain initialize
          app-store-connect fetch-signing-files "$IOS_BUNDLE_IDENTIFIER" --type IOS_APP_STORE --create
          keychain add-certificates
          cd ios
          xcode-project use-profiles

      - name: Install iOS pods
        script: |
          cd ios
          pod install --repo-update

      - name: Patch Pods
        script: |
          cd ios
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++20'
              config.build_settings['GCC_C_LANGUAGE_STANDARD'] = 'gnu11'
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['CODE_SIGNING_IDENTITY'] = ''
            end
          end
          project.save
          "

      - name: Build IPA
        script: |
          export RCT_NEW_ARCH_ENABLED=0
          export EXPO_NEW_ARCH_ENABLED=0
          xcode-project build-ipa \
            --workspace ios/*.xcworkspace \
            --scheme TenantPassport

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
