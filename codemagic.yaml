workflows:
  expo-ios:
    name: Expo iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagicFlutter

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tenantpassport.app
      groups:
        - Ios_signing
      node: latest
      xcode: latest
      vars:
        IOS_BUNDLE_IDENTIFIER: com.tenantpassport.app
        # SDK 56 / RN 0.85. Reanimated 4 requires the New Architecture.
        RCT_NEW_ARCH_ENABLED: "1"

    scripts:
      - name: Print iOS signing assets detected by Codemagic
        script: |
          echo "== Code signing identities (name + SHA-1) =="
          security find-identity -v -p codesigning || true

          echo
          echo "== Provisioning profiles available =="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if [[ -d "$PROFILE_DIR" ]]; then
            find "$PROFILE_DIR" -name "*.mobileprovision" -maxdepth 1 | while read -r profile; do
              echo
              echo "Profile file: $(basename "$profile")"
              security cms -D -i "$profile" > /tmp/codemagic_profile.plist
              /usr/libexec/PlistBuddy -c "Print :Name" /tmp/codemagic_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :UUID" /tmp/codemagic_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/codemagic_profile.plist || true
            done
          else
            echo "No provisioning profiles directory found at $PROFILE_DIR"
          fi

      - name: Set unique build number
        script: |
          # Unix timestamp => always higher than the last upload, so App Store
          # Connect never rejects a build for a duplicate version. Pinned here so
          # every step in this build sees the same value (read by app.config.js).
          echo "TENANTPASSPORT_BUILD_NUMBER=$(date +%s)" >> $CM_ENV

      - name: Install npm dependencies
        script: |
          # npm ci deletes node_modules and reinstalls from package-lock.json —
          # guarantees a clean state and prevents cached/incomplete installs.
          npm ci --legacy-peer-deps

      - name: Verify key packages installed
        script: |
          set -eo pipefail
          echo "=== node / npm versions ==="
          node --version && npm --version
          echo "=== expo-linking ==="
          node -e "console.log('  v' + require('./node_modules/expo-linking/package.json').version)" \
            || { echo "FATAL: expo-linking missing after npm ci"; exit 1; }
          echo "=== expo-constants ==="
          node -e "console.log('  v' + require('./node_modules/expo-constants/package.json').version)" \
            || { echo "FATAL: expo-constants missing after npm ci"; exit 1; }

      - name: Expo prebuild iOS
        script: |
          # --no-install prevents expo prebuild from running its own npm install,
          # which could restructure node_modules and drop expo-linking.
          npx expo prebuild --platform ios --clean --no-install

      - name: Verify Metro bundle resolves after prebuild
        script: |
          set -eo pipefail
          echo "=== expo-linking still present after prebuild? ==="
          node -e "console.log('  v' + require('./node_modules/expo-linking/package.json').version)" \
            || { echo "FATAL: expo-linking missing after prebuild — prebuild modified node_modules"; exit 1; }
          echo "=== Metro bundle smoke-test ==="
          npx expo export --platform ios --output-dir /tmp/expo-bundle-check
          echo "=== Metro bundle: all modules resolved OK ==="

      - name: Validate App Store Connect secrets
        script: |
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"
          REQUIRED_VARS=(
            APP_STORE_CONNECT_KEY_IDENTIFIER
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_PRIVATE_KEY
            IOS_BUNDLE_IDENTIFIER
          )
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME:-}" ]]; then
              echo "Missing required Codemagic secret: $VAR_NAME"
              exit 1
            fi
          done
          echo "App Store Connect secrets detected."

      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"
          keychain initialize
          app-store-connect fetch-signing-files "$IOS_BUNDLE_IDENTIFIER" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key-password "${CERTIFICATE_PRIVATE_KEY_PASSWORD:-}" || true
          keychain add-certificates

          echo "== Certificates in keychain after setup =="
          security find-identity -v -p codesigning || true

          echo "== Provisioning profiles installed =="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ls -1 "$PROFILE_DIR" 2>/dev/null || echo "No profiles directory found"

          cd ios
          # Apply profiles — without --warn-only so the build fails loudly if no profile is found
          xcode-project use-profiles

      - name: Install iOS pods
        script: |
          cd ios
          pod install --repo-update

      - name: Build IPA
        script: |
          set -euo pipefail

          echo "=== ios/ workspace files ==="
          ls -1 ios/*.xcworkspace 2>/dev/null || { echo "ERROR: no .xcworkspace found in ios/"; exit 1; }

          xcode-project build-ipa \
            --workspace ios/TenantPassport.xcworkspace \
            --scheme TenantPassport \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcodebuild_logs/

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true 
